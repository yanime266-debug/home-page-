<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a16"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1a3e"/>
      <stop offset="100%" stop-color="#150a20"/>
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="400" height="300" fill="url(#bgGrad)"/>

  <!-- Lignes de perspective néon au sol -->
  <g opacity="0.3">
    <line x1="0" y1="240" x2="400" y2="240" stroke="#00f0ff" stroke-width="2"/>
    <line x1="50" y1="240" x2="-20" y2="300" stroke="#00f0ff" stroke-width="2"/>
    <line x1="150" y1="240" x2="120" y2="300" stroke="#00f0ff" stroke-width="2"/>
    <line x1="250" y1="240" x2="280" y2="300" stroke="#00f0ff" stroke-width="2"/>
    <line x1="350" y1="240" x2="420" y2="300" stroke="#00f0ff" stroke-width="2"/>
  </g>

  <!-- Sol -->
  <rect x="0" y="240" width="400" height="60" fill="url(#groundGrad)"/>

  <!-- Haie jaune/noire style pixel -->
  <g transform="translate(170, 205)">
    <!-- Pieds de la haie -->
    <rect x="5" y="25" width="8" height="15" fill="#444"/>
    <rect x="47" y="25" width="8" height="15" fill="#444"/>
    <!-- Barre jaune -->
    <rect x="0" y="5" width="60" height="22" fill="#ffcc00" filter="url(#neonGlow)"/>
    <!-- Rayures noires -->
    <rect x="8" y="5" width="8" height="22" fill="#1a1a1a"/>
    <rect x="26" y="5" width="8" height="22" fill="#1a1a1a"/>
    <rect x="44" y="5" width="8" height="22" fill="#1a1a1a"/>
    <!-- Bordure -->
    <rect x="0" y="5" width="60" height="3" fill="#ffee55"/>
    <rect x="0" y="24" width="60" height="3" fill="#ffee55"/>
    <!-- Texte 1M -->
    <text x="30" y="20" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#1a1a1a">1M</text>
  </g>

  <!-- Personnage pixel art en saut -->
  <g transform="translate(185, 95)" filter="url(#neonGlow)">
    <!-- Ombre portée sous le personnage -->
    <ellipse cx="15" cy="155" rx="35" ry="8" fill="#000" opacity="0.3"/>

    <!-- Jambe gauche (pliée en arrière) -->
    <rect x="-25" y="85" width="18" height="12" fill="#e63946"/>
    <rect x="-35" y="90" width="14" height="10" fill="#e63946"/>
    <rect x="-42" y="92" width="10" height="12" fill="#c1121f"/>

    <!-- Jambe droite (pliée devant) -->
    <rect x="20" y="80" width="16" height="14" fill="#e63946"/>
    <rect x="30" y="68" width="14" height="16" fill="#e63946"/>
    <rect x="38" y="58" width="10" height="14" fill="#c1121f"/>

    <!-- Short -->
    <rect x="-12" y="60" width="38" height="28" fill="#c1121f"/>
    <rect x="-12" y="60" width="38" height="6" fill="#e63946"/>

    <!-- Torso / débardeur -->
    <rect x="-10" y="22" width="34" height="42" fill="#f1faee"/>
    <rect x="-10" y="22" width="34" height="8" fill="#e63946"/>

    <!-- Bras gauche (plié) -->
    <rect x="-22" y="28" width="14" height="10" fill="#f1faee"/>
    <rect x="-30" y="22" width="10" height="14" fill="#f1faee"/>
    <rect x="-36" y="20" width="10" height="10" fill="#ffcdb2"/>

    <!-- Bras droit (plié) -->
    <rect x="22" y="26" width="14" height="10" fill="#f1faee"/>
    <rect x="32" y="18" width="10" height="16" fill="#f1faee"/>
    <rect x="38" y="14" width="10" height="10" fill="#ffcdb2"/>

    <!-- Tête -->
    <rect x="-4" y="-8" width="24" height="26" fill="#ffcdb2"/>
    <!-- Cheveux -->
    <rect x="-4" y="-12" width="24" height="8" fill="#8d5524"/>
    <rect x="-4" y="-4" width="6" height="6" fill="#8d5524"/>
    <rect x="14" y="-4" width="6" height="6" fill="#8d5524"/>
    <!-- Bandeau -->
    <rect x="-6" y="-6" width="28" height="6" fill="#e63946"/>
    <rect x="-6" y="-2" width="28" height="2" fill="#ff4d6d"/>
    <!-- Yeux -->
    <rect x="2" y="4" width="4" height="4" fill="#1a1a1a"/>
    <rect x="14" y="4" width="4" height="4" fill="#1a1a1a"/>
    <!-- Bouche déterminée -->
    <rect x="6" y="12" width="8" height="2" fill="#8d5524"/>

    <!-- Chaussures rouges -->
    <rect x="-44" y="102" width="14" height="8" fill="#e63946"/>
    <rect x="-44" y="102" width="4" height="8" fill="#fff"/>
    <rect x="36" y="52" width="14" height="8" fill="#e63946"/>
    <rect x="36" y="52" width="4" height="8" fill="#fff"/>
  </g>

  <!-- Effet de vitesse / traînée -->
  <g opacity="0.4">
    <rect x="120" y="130" width="20" height="4" fill="#00f0ff"/>
    <rect x="110" y="140" width="28" height="4" fill="#00f0ff"/>
    <rect x="125" y="150" width="16" height="4" fill="#00f0ff"/>
  </g>

  <!-- Particules néon autour du personnage -->
  <rect x="260" y="80" width="6" height="6" fill="#ff00aa" opacity="0.8"/>
  <rect x="280" y="120" width="4" height="4" fill="#00f0ff" opacity="0.8"/>
  <rect x="100" y="100" width="5" height="5" fill="#bd00ff" opacity="0.8"/>
</svg>
